# Render Blueprint Specification
services:
  - type: web
    name: nexara-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: NEO4J_URI
        sync: false # Set in Render Dashboard
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: IBM_CSV_PATH
        value: data/nexara_test_data.csv
    healthCheckPath: /health
